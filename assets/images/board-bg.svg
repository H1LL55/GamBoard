<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="60%" stop-color="#071723" />
      <stop offset="100%" stop-color="#04121a" />
    </radialGradient>
    <linearGradient id="neon" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#ffcc33" />
      <stop offset="50%" stop-color="#ff7b7b" />
      <stop offset="100%" stop-color="#7bc8ff" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="t" mode="overlay" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />
  <!-- soft vignette circles -->
  <g opacity="0.08">
    <circle cx="800" cy="350" r="420" fill="url(#neon)" />
    <circle cx="1200" cy="1100" r="380" fill="#0f2533" />
  </g>
  <!-- subtle pattern -->
  <g opacity="0.05" fill="#fff">
    <circle cx="200" cy="200" r="6" />
    <circle cx="250" cy="230" r="4" />
    <circle cx="300" cy="190" r="5" />
    <circle cx="1000" cy="450" r="5" />
    <circle cx="600" cy="700" r="4" />
    <circle cx="1400" cy="300" r="4" />
  </g>
  <!-- large neon title faint in center -->
  <g transform="translate(800,800)" opacity="0.08">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="160" font-weight="700" fill="url(#neon)">VEGAS BOARD</text>
  </g>
  <!-- decorative corner lights -->
  <g fill="url(#neon)" opacity="0.14">
    <rect x="40" y="40" width="140" height="10" rx="6" />
    <rect x="1460" y="40" width="140" height="10" rx="6" transform="translate(-1400,0) scale(-1,1)" />
    <rect x="40" y="1550" width="140" height="10" rx="6" />
    <rect x="1460" y="1550" width="140" height="10" rx="6" transform="translate(-1400,0) scale(-1,1)" />
  </g>
</svg>
