<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#ffcc33"/>
      <stop offset="1" stop-color="#ff9933"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#g)" />
  <g transform="translate(10,12)" fill="#6b2f00">
    <!-- stylised dice pip cluster / G letter -->
    <circle cx="10" cy="10" r="3" fill="#fff" />
    <circle cx="26" cy="10" r="3" fill="#fff" />
    <circle cx="10" cy="26" r="3" fill="#fff" />
    <circle cx="26" cy="26" r="3" fill="#fff" />
  </g>
  <text x="32" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#6b2f00" font-weight="700">G</text>
