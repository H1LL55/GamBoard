<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Baccarat - GamBoard mini-game</title>
	<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
	<link rel="stylesheet" href="css/styles.css">
 </head>
<body>
	<main style="padding:24px;max-width:720px;margin:auto">
		<h1>Baccarat</h1>
		<div id="playerSelect"></div>
		<div id="area" style="display:none">
			<div style="display:flex;gap:12px;align-items:center">
				<label>Bet: $<input id="bet" type="number" min="1" value="20" style="width:100px"></label>
				<label>Choose: <select id="choice"><option value="player">Player</option><option value="banker">Banker</option><option value="tie">Tie</option></select></label>
				<button id="playBtn">Play</button>
				<button id="backBtn">Return</button>
			</div>
			<div style="margin-top:12px">
				<div>Player hand: <span id="ph">—</span> (<span id="pt">—</span>)</div>
				<div>Banker hand: <span id="bh">—</span> (<span id="bt">—</span>)</div>
			</div>
			<div id="result" style="margin-top:12px;font-weight:700"></div>
		</div>
		<p style="margin-top:18px"><a href="index.html">Return to main board</a></p>
	</main>

	<script>
		function readState(){ const raw=localStorage.getItem('gamboard_state'); return raw?JSON.parse(raw):{players:[],current:0,bank:0}; }
		function saveState(s){ localStorage.setItem('gamboard_state', JSON.stringify(s)); }
		const playerSelectEl = document.getElementById('playerSelect'); const area = document.getElementById('area'); const backBtn = document.getElementById('backBtn'); const playBtn = document.getElementById('playBtn'); const betInput = document.getElementById('bet'); const choiceEl = document.getElementById('choice'); const ph = document.getElementById('ph'); const bh = document.getElementById('bh'); const pt = document.getElementById('pt'); const bt = document.getElementById('bt'); const resultEl = document.getElementById('result');
		const MIN_BET = 10;
		let state = readState(), curPlayer=null;
			function listPlayers(){
				const params = new URLSearchParams(location.search);
				const playerParam = params.get('player');
				state = readState(); if(!state.players || state.players.length===0){ playerSelectEl.innerHTML = '<div>No players found. Return to board and add players.</div>'; return; }
				let html = '<label>Choose player: <select id="playerSel">'; for(const p of state.players) html += `<option value="${p.id}">${p.name} ($${p.money})</option>`; html += '</select></label> <button id="chooseBtn">Play</button>';
				playerSelectEl.innerHTML = html;
				const chooseBtn = document.getElementById('chooseBtn');
				chooseBtn.addEventListener('click', ()=>{ 
					const sel = document.getElementById('playerSel').value; 
					curPlayer = state.players.find(x=>x.id==sel); 
					if(!curPlayer){ alert('Invalid player'); return; } 
					// set bet bounds per rules
					const max = curPlayer.money <= 100 ? curPlayer.money : Math.floor(curPlayer.money/2);
					betInput.min = MIN_BET;
					betInput.max = max;
					betInput.value = Math.min(max, Math.max(MIN_BET, Number(betInput.value) || MIN_BET));
					area.style.display='block'; playerSelectEl.style.display='none'; 
				});
				if(playerParam){ const selEl = document.getElementById('playerSel'); if(selEl.querySelector(`option[value="${playerParam}"]`)){ selEl.value = playerParam; chooseBtn.click(); } }
			}

		function draw(){ return Math.floor(Math.random()*10); } // baccarat uses 0-9

		playBtn.addEventListener('click', ()=>{
				// enforce bet rules
				const bet = Math.floor(Number(betInput.value) || MIN_BET);
				const max = curPlayer.money <= 100 ? curPlayer.money : Math.floor(curPlayer.money/2);
				if(bet < MIN_BET){ alert(`Minimum bet is $${MIN_BET}`); return; }
				if(bet > max){ alert(`Maximum bet for this player is $${max}`); return; }
				if(bet>curPlayer.money){ alert('Bet exceeds money'); return; }
				const pVal = (draw()+draw())%10; const bVal = (draw()+draw())%10; ph.textContent = pVal; bh.textContent = bVal; pt.textContent = pVal; bt.textContent = bVal;
				const choice = choiceEl.value; state = readState(); const p = state.players.find(x=>x.id==curPlayer.id);
				if(choice==='player'){ if(pVal>bVal){ p.money += bet; resultEl.textContent = `Player wins! You won $${bet}`; } else if(pVal===bVal){ resultEl.textContent='Tie — no money exchanged.'; } else { p.money -= bet; resultEl.textContent = `You lost $${bet}`; } }
				else if(choice==='banker'){ if(bVal>pVal){ p.money += Math.floor(bet*0.95); resultEl.textContent = `Banker wins! You won $${Math.floor(bet*0.95)}`; } else if(pVal===bVal){ resultEl.textContent='Tie — no money exchanged.'; } else { p.money -= bet; resultEl.textContent = `You lost $${bet}`; } }
				else { if(pVal===bVal){ p.money += bet*8; resultEl.textContent = `Tie! You won $${bet*8}`; } else { p.money -= bet; resultEl.textContent = `You lost $${bet}`; } }
							saveState(state); listPlayers();
							// auto-return after short delay so player sees result
							setTimeout(()=>{
								const pid = curPlayer ? curPlayer.id : null;
								const q = pid ? `?return=board&player=${encodeURIComponent(pid)}&fromMini=backarat&advance=1` : '?return=board';
								window.location.href = 'index.html' + q;
							}, 1200);
			});

			backBtn.addEventListener('click', ()=>{
				const pid = curPlayer ? curPlayer.id : null;
				const q = pid ? `?return=board&player=${encodeURIComponent(pid)}&fromMini=backarat&advance=1` : '?return=board';
				window.location.href = 'index.html' + q;
			});
		listPlayers();
	</script>
</body>
</html>
