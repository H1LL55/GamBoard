<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Roulette - GamBoard mini-game</title>
	<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
	<link rel="stylesheet" href="css/styles.css">
 </head>
<body>
	<main style="padding:24px;max-width:720px;margin:auto">
		<h1>Roulette</h1>
		<div id="playerSelect"></div>
		<div id="rouletteArea" style="display:none">
			<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
				<label>Bet: $<input id="bet" type="number" min="1" value="10" style="width:100px"></label>
				<label>Type:
					<select id="betType">
						<option value="color">Color (red/black) 1:1</option>
						<option value="number">Number (0-36) 35:1</option>
					</select>
				</label>
				<input id="betVal" placeholder="red/black or number" style="width:150px">
				<button id="spinBtn">Spin</button>
				<button id="backBtn">Return</button>
			</div>
						<div id="wheel" style="margin-top:20px;font-size:48px;text-align:center">
							<div class="wheelInner" id="wheelInner">—</div>
						</div>
			<div id="result" style="margin-top:12px;font-weight:700"></div>
		</div>

		<p style="margin-top:18px"><a href="index.html">Return to main board</a></p>
	</main>

	<script>
		const playerSelectEl = document.getElementById('playerSelect');
		const rouletteArea = document.getElementById('rouletteArea');
		const spinBtn = document.getElementById('spinBtn');
		const backBtn = document.getElementById('backBtn');
		const betInput = document.getElementById('bet');
		const betType = document.getElementById('betType');
		const betVal = document.getElementById('betVal');
	const wheel = document.getElementById('wheel');
	const wheelInner = document.getElementById('wheelInner');
		const resultEl = document.getElementById('result');
		const MIN_BET = 10;

		function readState(){ const raw=localStorage.getItem('gamboard_state'); return raw?JSON.parse(raw):{players:[],current:0,bank:0}; }
		function saveState(s){ localStorage.setItem('gamboard_state', JSON.stringify(s)); }

		let state = readState(), curPlayer=null;

			function listPlayers(){
				const params = new URLSearchParams(location.search);
				const playerParam = params.get('player');
				state = readState(); if(!state.players || state.players.length===0){ playerSelectEl.innerHTML = '<div>No players found. Return to board and add players.</div>'; return; }
				let html = '<label>Choose player: <select id="playerSel">'; for(const p of state.players) html += `<option value="${p.id}">${p.name} ($${p.money})</option>`; html += '</select></label> <button id="chooseBtn">Play</button>';
				playerSelectEl.innerHTML = html;
				const chooseBtn = document.getElementById('chooseBtn');
				chooseBtn.addEventListener('click', ()=>{
					const sel = document.getElementById('playerSel').value;
					curPlayer = state.players.find(x=>x.id==sel);
					if(!curPlayer){ alert('Invalid player'); return; }
					// set bet bounds per rules: min = MIN_BET, max = half money (or full money if <=100)
					const max = curPlayer.money <= 100 ? curPlayer.money : Math.floor(curPlayer.money/2);
					betInput.min = MIN_BET;
					betInput.max = max;
					betInput.value = Math.min(max, Math.max(MIN_BET, Number(betInput.value) || MIN_BET));
					rouletteArea.style.display='block'; playerSelectEl.style.display='none';
				});
				if(playerParam){ const selEl = document.getElementById('playerSel'); if(selEl.querySelector(`option[value="${playerParam}"]`)){ selEl.value = playerParam; chooseBtn.click(); } }
			}

		function spin(){
			// enforce bet rules
			const bet = Math.floor(Number(betInput.value) || MIN_BET);
			const max = curPlayer.money <= 100 ? curPlayer.money : Math.floor(curPlayer.money/2);
			if(bet < MIN_BET){ alert(`Minimum bet is $${MIN_BET}`); return; }
			if(bet > max){ alert(`Maximum bet for this player is $${max}`); return; }
			if(bet > curPlayer.money){ alert('Bet exceeds money'); return; }
			const type = betType.value; const val = betVal.value.trim().toLowerCase(); resultEl.textContent='';
			// simulate spin
			wheelInner.textContent='Spinning…'; wheelInner.classList.add('spin'); spinBtn.disabled=true;
			setTimeout(()=>{
		const number = Math.floor(Math.random()*37); // 0..36
				const red = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(number);
				const color = number===0? 'green' : (red? 'red':'black');
				wheelInner.textContent = `${number} ${color}`;
				wheelInner.classList.remove('spin');
				// evaluate
				state = readState(); const p = state.players.find(x=>x.id==curPlayer.id);
				if(type==='color'){
					if(val!== 'red' && val!=='black'){ alert('Enter red or black'); spinBtn.disabled=false; return; }
					if(val===color){ p.money += bet; resultEl.textContent = `You won $${bet}`; } else { p.money -= bet; resultEl.textContent = `You lost $${bet}`; }
				} else {
					const n = Number(val);
					if(isNaN(n) || n<0 || n>36){ alert('Enter number 0-36'); spinBtn.disabled=false; return; }
					if(n===number){ p.money += bet*35; resultEl.textContent = `You hit ${n}! You won $${bet*35}`; } else { p.money -= bet; resultEl.textContent = `You lost $${bet}`; }
				}
												saveState(state); listPlayers(); spinBtn.disabled=false;
												// auto-return after short delay so player sees result
												setTimeout(()=>{
													const pid = curPlayer ? curPlayer.id : null;
													const q = pid ? `?return=board&player=${encodeURIComponent(pid)}&fromMini=roulette&advance=1` : '?return=board';
													window.location.href = 'index.html' + q;
												}, 1200);
			}, 900);
		}

			spinBtn.addEventListener('click', spin);
			backBtn.addEventListener('click', ()=>{
				const pid = curPlayer ? curPlayer.id : null;
				const q = pid ? `?return=board&player=${encodeURIComponent(pid)}&fromMini=roulette&advance=1` : '?return=board';
				window.location.href = 'index.html' + q;
			});
		listPlayers();
	</script>
</body>
</html>
